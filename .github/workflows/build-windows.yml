name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build EXE
        shell: powershell
        run: |
          pyinstaller .\GamingLaptopChecker.spec --noconfirm --clean
          .\dist\GamingLaptopChecker.exe --version
          .\dist\GamingLaptopChecker.exe --smoke-report

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: GamingLaptopChecker.exe
          path: dist/GamingLaptopChecker.exe

      - name: Attach EXE to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/GamingLaptopChecker.exe
